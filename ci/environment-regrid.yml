name: hycom-analysis-env
channels:
  - conda-forge
dependencies:
  - python=3.11
  - numpy
  - xarray
  - cftime
  # regridding stack (xesmf pulls in ESMF/esmpy, which is conda-only)
  - xgcm
  - xesmf
  - dask
  - scipy
  # Jupyter, so `jupyter lab` runs directly from this environment in an
  # Open OnDemand JupyterLab session
  - jupyterlab
  - ipykernel
  # testing
  - pytest
  - pytest-cov
  - pip
  - pip:
      - -e ..         # install xhycom itself in editable mode
