name: hycom-analysis-env
channels:
  - conda-forge
dependencies:
  # --- core ---
  - python=3.11
  - numpy
  - xarray
  - cftime

  # --- regridding ---
  - xgcm
  - xesmf
  - dask
  - numba     # xgcm's Grid.transform needs this for method="conservative"
  - scipy
  - netcdf4   # opening GLORYS / writing regridded output to NetCDF

  # --- jupyter ---
  - jupyterlab
  - ipykernel

  # --- testing ---
  - pytest
  - pytest-cov
  - pre-commit

  # --- local editable installs ---
  - pip
  - pip:
      - -e ..         # install xhycom itself in editable mode
