name: Publish Release Notes

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  publish-release-notes:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Add to releases.md
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const labels = pr.labels.map(l => l.name);
            
            let categoryHeader = '### 🔧 Internal';
            if (labels.includes('breaking')) categoryHeader = '### 🚨 Breaking Changes';
            else if (labels.includes('feature')) categoryHeader = '### ✨ New Features';
            else if (labels.includes('docs')) categoryHeader = '### 📚 Documentation';
            else if (labels.includes('bug')) categoryHeader = '### 🐛 Bug Fixes';
            
            const date = new Date().toISOString().split('T')[0];
            const entry = `- **${pr.title}** ([#${pr.number}](${pr.html_url})) — _${date}_`;
            
            // Read releases.md
            let content = fs.readFileSync('docs/releases.md', 'utf8');
            
            // Ensure [Unreleased] section exists
            if (!content.includes('## [Unreleased]')) {
              content = '## [Unreleased]\n\n' + content;
            }
            
            // Find or create category under [Unreleased]
            const lines = content.split('\n');
            let unreleasedIdx = -1;
            let categoryIdx = -1;
            
            for (let i = 0; i < lines.length; i++) {
              if (lines[i] === '## [Unreleased]') {
                unreleasedIdx = i;
              }
              if (unreleasedIdx !== -1 && lines[i] === categoryHeader) {
                categoryIdx = i;
                break;
              }
              // Stop if we hit next version section
              if (unreleasedIdx !== -1 && lines[i].match(/^## \[v?\d+\.\d+/)) {
                break;
              }
            }
            
            // Insert category if not found
            if (categoryIdx === -1) {
              categoryIdx = unreleasedIdx + 1;
              while (categoryIdx < lines.length && lines[categoryIdx].match(/^###/)) {
                categoryIdx++;
              }
              lines.splice(categoryIdx, 0, categoryHeader, '');
            }
            
            // Insert entry after category header
            lines.splice(categoryIdx + 1, 0, entry);
            
            fs.writeFileSync('docs/releases.md', lines.join('\n'));
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/releases.md
          git commit -m "docs: Add release note for PR #${{ github.event.pull_request.number }}"
          git push
